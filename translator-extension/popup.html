<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek 翻译助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ========== API Key 配置区 ========== -->
  <div id="config-section">
    <h3>🔑 配置 DeepSeek API Key</h3>
    <p class="hint">
      前往
      <a href="https://platform.deepseek.com/api_keys" target="_blank">
        platform.deepseek.com
      </a>
      注册并获取 API Key
    </p>
    <input type="password" id="api-key-input" placeholder="sk-..." />

    <div class="config-actions">
      <button id="save-key-btn">保存 Key</button>
      <button id="back-to-translate-btn">返回</button>
    </div>

    <button id="clear-key-btn" class="link-btn">清除已保存的 Key</button>

    <p id="key-status" class="status-msg"></p>
  </div>

  <!-- ========== 翻译主界面 ========== -->
  <div id="translate-section" class="hidden">
    <div class="header">
      <h2>DeepSeek 翻译</h2>
      <button id="settings-btn" class="header-btn" title="API Key 设置">⚙️</button>
    </div>

    <textarea id="source-text" placeholder="输入要翻译的文本..." rows="4"></textarea>

    <div class="controls">
      <span class="label">翻译为：</span>
      <select id="target-lang">
        <option value="中文">中文</option>
        <option value="英语" selected>英语</option>
        <option value="日语">日语</option>
        <option value="韩语">韩语</option>
        <option value="法语">法语</option>
        <option value="德语">德语</option>
        <option value="西班牙语">西班牙语</option>
        <option value="俄语">俄语</option>
        <option value="阿拉伯语">阿拉伯语</option>
        <option value="葡萄牙语">葡萄牙语</option>
      </select>
      <button id="translate-btn">翻译</button>
    </div>

    <div id="result-area">
      <div class="result-header">
        <span class="result-label">翻译结果</span>
        <button id="copy-btn" class="hidden" title="复制到剪贴板">📋 复制</button>
      </div>
      <p id="result-text" class="result-placeholder">翻译结果将显示在这里</p>
    </div>

    <p id="error-msg" class="status-msg"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
